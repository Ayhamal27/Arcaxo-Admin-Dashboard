name: Deploy to Cloud Run

  on:
    push:
      branches:
        - main

  env:
    PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    REGION: ${{ secrets.GCP_REGION }}
    REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
    SERVICE: ${{ secrets.GCP_SERVICE_NAME }}
    IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/app

  jobs:
    deploy:
      name: Build & Deploy
      runs-on: ubuntu-latest
      permissions:
        contents: read

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Authenticate to Google Cloud
          uses: google-github-actions/auth@v2
          with:
            credentials_json: ${{ secrets.GCP_SA_KEY }}

        - name: Configure Docker for Artifact Registry
          run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

        - name: Build Docker image
          run: |
            docker build \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" \
              --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
              --build-arg NEXT_PUBLIC_APP_ENV="${{ secrets.NEXT_PUBLIC_APP_ENV }}" \
              --build-arg NEXT_PUBLIC_APP_VERSION="${{ secrets.NEXT_PUBLIC_APP_VERSION }}" \
              -t ${{ env.IMAGE }}:${{ github.sha }} \
              -t ${{ env.IMAGE }}:latest \
              .

        - name: Push image to Artifact Registry
          run: |
            docker push ${{ env.IMAGE }}:${{ github.sha }}
            docker push ${{ env.IMAGE }}:latest

        - name: Deploy to Cloud Run
          run: |
            gcloud run deploy ${{ env.SERVICE }} \
              --image=${{ env.IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --platform=managed \
              --allow-unauthenticated \
              --min-instances=0 \
              --max-instances=10 \
              --memory=512Mi \
              --cpu=1 \
              --port=8080 \
              --set-env-vars="NODE_ENV=production,SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              --quiet